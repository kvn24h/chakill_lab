name: Sync catalogo desde Notion
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Sincronizar catalogo
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          curl -s "https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"filter":{"property":"Activo","checkbox":{"equals":true}}}' \
          | python3 << 'PYEOF'
import json, sys
data = json.load(sys.stdin)
products = []
for r in data.get('results', []):
    p = r['properties']
    products.append({
        'id': r['id'],
        'nombre': p.get('Nombre', {}).get('title', [{}])[0].get('plain_text', '') if p.get('Nombre', {}).get('title') else '',
        'precio': p.get('Precio', {}).get('number', 0),
        'color': p.get('Color', {}).get('rich_text', [{}])[0].get('plain_text', '') if p.get('Color', {}).get('rich_text') else '',
        'etiqueta': (p.get('Etiqueta', {}).get('select') or {}).get('name', ''),
        'sku': p.get('SKU', {}).get('rich_text', [{}])[0].get('plain_text', '') if p.get('SKU', {}).get('rich_text') else '',
        'descripcion': p.get('Descripcion', {}).get('rich_text', [{}])[0].get('plain_text', '') if p.get('Descripcion', {}).get('rich_text') else ''
    })
with open('catalog.json', 'w') as f:
    json.dump(products, f, indent=2, ensure_ascii=False)
print('Productos sincronizados:', len(products))
PYEOF
      - name: Commit catalog.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --staged --quiet || git commit -m "sync: actualizar catalog.json desde Notion [skip ci]"
          git push
